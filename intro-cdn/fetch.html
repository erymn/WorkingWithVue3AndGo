<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <div id="app">
                    <h3 class="mt-3">Books: {{books.results.length}}</h3>
                    <ul class="list-group">
                        <book-item v-for="item in books.results" v-bind:book="item" v-bind:key="item.id"
                            v-bind:id="item.id">
                        </book-item>
                    </ul>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.38/dist/vue.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="forms.js"></script>

    <script>
        let data = {
            books: {
                results: []
            }
        }

        const vm = Vue.createApp({
            data() {
                return data
            },
            mounted() {
                console.log("mounted")
                fetch("https://gutendex.com/books/")
                    .then(response => response.json())
                    .then(data => {
                        this.books = data
                        for (let i = 0; i < this.books.results.length; i++) {
                            console.log("id", this.books.results[i].id, "title", this.books.results[i].title)
                        }
                    })
            },
            components: {
                'book-item': BookItem
            }
        }).mount("#app")
    </script>
</body>

</html>
